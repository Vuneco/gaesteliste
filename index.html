<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Gästeliste Anmeldung</title>
</head>
<body>
  <h2>📝 Anmeldung zur Veranstaltung</h2>

  <form id="anmeldungForm">
    <label>Vorname:</label><br>
    <input type="text" name="vorname" required><br><br>

    <label>Nachname:</label><br>
    <input type="text" name="nachname" required><br><br>

    <label>Wie viele Personen kommen mit?</label><br>
    <input type="number" name="anzahl" min="1" required><br><br>

    <button type="submit">Speichern</button>
  </form>

  <div id="danke" style="display:none;">
    ✅ Vielen Dank! Deine Anmeldung wurde gespeichert.
  </div>

  <script>
  const form = document.getElementById('anmeldungForm');
  const danke = document.getElementById('danke');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const params = new URLSearchParams(data);

    try {
      const res = await fetch("https://script.google.com/macros/s/AKfycbyv1pDfUO-LkJKAm_F74t57HKsVCn1f_JMyW-bMM-EKX25Jr5qYXcCGS26BErQos2e_/exec", {
        method: "POST",
        body: params
      });

      if (res.ok) {
        form.style.display = 'none';
        danke.style.display = 'block';
      } else {
        alert("Fehler beim Speichern (Code: " + res.status + ")");
      }

    } catch (error) {
      alert("Fehler beim Speichern: " + error.message);
    }
  });
</script>
</body>
</html>
